<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI - ISTJ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      position: relative;
      width: 1440px;
      height: 810px;
      background: #ffffff;
      overflow: hidden;
    }

    /* 상단 좌측 - 타입 코드 */
    .type-code {
      position: absolute;
      top: 32px;
      left: 40px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    /* 하단 좌측 - 별명 */
    .type-nickname {
      position: absolute;
      bottom: 32px;
      left: 40px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    /* 하단 우측 - 그룹 */
    .type-group {
      position: absolute;
      bottom: 32px;
      right: 40px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    /* 십자 축 */
    .axis-vertical {
      position: absolute;
      left: 50%;
      top: 70px;
      width: 2px;
      height: 280px;
      background: #1a1a1a;
      transform: translateX(-50%);
    }

    .axis-vertical-bottom {
      position: absolute;
      left: 50%;
      bottom: 70px;
      width: 2px;
      height: 280px;
      background: #1a1a1a;
      transform: translateX(-50%);
    }

    .axis-horizontal-left {
      position: absolute;
      top: 50%;
      left: 30px;
      width: 460px;
      height: 2px;
      background: #1a1a1a;
      transform: translateY(-50%);
    }

    .axis-horizontal-right {
      position: absolute;
      top: 50%;
      right: 30px;
      width: 460px;
      height: 2px;
      background: #1a1a1a;
      transform: translateY(-50%);
    }

    /* 축 라벨 */
    .label-top {
      position: absolute;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      font-weight: 400;
      color: #1a1a1a;
    }

    .label-bottom {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      font-weight: 400;
      color: #1a1a1a;
    }

    .label-left {
      position: absolute;
      top: 50%;
      left: 30px;
      transform: translateY(-50%);
      font-size: 15px;
      font-weight: 400;
      color: #1a1a1a;
    }

    .label-right {
      position: absolute;
      top: 50%;
      right: 30px;
      transform: translateY(-50%);
      font-size: 15px;
      font-weight: 400;
      color: #1a1a1a;
    }

    /* 중앙 타이틀 */
    .center-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    .center-title h1 {
      font-size: 52px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -1px;
      color: #1a1a1a;
    }

    .center-title .subtitle {
      margin-top: 12px;
      font-size: 16px;
      font-weight: 300;
      color: #555;
      letter-spacing: 2px;
    }

    /* 장식 원 (체크무늬 패턴) */
    .deco-circle {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(200,200,200,0.3) 1px, transparent 1px);
      background-size: 6px 6px;
      opacity: 0.6;
    }

    .deco-1 {
      top: 110px;
      left: 420px;
    }

    .deco-2 {
      top: 240px;
      right: 300px;
    }

    .deco-3 {
      bottom: 260px;
      left: 280px;
    }

    .deco-4 {
      bottom: 170px;
      right: 380px;
    }

    /* 사분면 특성 텍스트 */
    .trait {
      position: absolute;
      max-width: 200px;
      text-align: center;
    }

    .trait .trait-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: #1a1a1a;
    }

    .trait .trait-desc {
      font-size: 12px;
      font-weight: 300;
      line-height: 1.6;
      color: #666;
    }

    /* 사분면 위치 */
    .trait-tl {
      top: 130px;
      left: 120px;
    }

    .trait-tr {
      top: 130px;
      right: 120px;
    }

    .trait-bl {
      bottom: 130px;
      left: 120px;
    }

    .trait-br {
      bottom: 130px;
      right: 120px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- 모서리 라벨 -->
    <div class="type-code">MBTI &mdash; ISTJ</div>
    <div class="type-nickname">청렴결백한 논리주의자</div>
    <div class="type-group">감시자 그룹 (SJ)</div>

    <!-- 십자 축 -->
    <div class="axis-vertical"></div>
    <div class="axis-vertical-bottom"></div>
    <div class="axis-horizontal-left"></div>
    <div class="axis-horizontal-right"></div>

    <!-- 축 라벨 -->
    <div class="label-top">신뢰와 책임감</div>
    <div class="label-bottom">체계와 원칙</div>
    <div class="label-left">내향적 사고</div>
    <div class="label-right">현실적 실행</div>

    <!-- 중앙 타이틀 -->
    <div class="center-title">
      <h1>ISTJ</h1>
      <div class="subtitle">THE LOGISTICIAN</div>
    </div>

    <!-- 장식 원 -->
    <div class="deco-circle deco-1"></div>
    <div class="deco-circle deco-2"></div>
    <div class="deco-circle deco-3"></div>
    <div class="deco-circle deco-4"></div>

    <!-- 사분면 특성 -->
    <div class="trait trait-tl">
      <div class="trait-title">성실함</div>
      <div class="trait-desc">맡은 일에 대한 강한 책임감으로 끝까지 완수하며, 약속을 반드시 지킵니다</div>
    </div>

    <div class="trait trait-tr">
      <div class="trait-title">체계적 실행</div>
      <div class="trait-desc">계획을 세우고 단계별로 실행하며, 효율적인 프로세스를 선호합니다</div>
    </div>

    <div class="trait trait-bl">
      <div class="trait-title">깊은 집중력</div>
      <div class="trait-desc">혼자만의 시간에서 에너지를 충전하고, 깊이 있는 사고를 통해 문제를 해결합니다</div>
    </div>

    <div class="trait trait-br">
      <div class="trait-title">현실 감각</div>
      <div class="trait-desc">추상적 이론보다 검증된 사실과 경험을 중시하며, 실용적 해결책을 찾습니다</div>
    </div>

  </div>

</body>
</html>
