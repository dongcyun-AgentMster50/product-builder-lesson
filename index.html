<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <link rel="stylesheet" href="style.css?v=1.3"> 
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="header">
                <img src="https://i.imgur.com/8v2z3of.png" alt="dice icon" class="dice-icon">
                <h2>로또 번호 추천기</h2>
            </div>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
                화이트 모드
            </button>
        </div>
        <p class="description">버튼을 누르면 1~45 사이에서 중복 없이 번호를 뽑아줘요.</p>
        
        <div class="main-actions">
            <button id="generate-btn">번호 추천 받기</button>
            <button id="copy-btn">복사</button>
        </div>
        
        <div class="bonus-option">
            <input type="checkbox" id="bonus-checkbox">
            <label for="bonus-checkbox">5개 번호만 뽑기</label>
        </div>
        
        <div class="results-container">
            <div id="numbers-display" class="numbers-display">
                <!-- 번호가 여기에 표시됩니다 -->
            </div>
            <p id="timestamp" class="timestamp"></p>
        </div>
    </div>
    <script src="main.js?v=1.3"></script>
</body>
</html>
