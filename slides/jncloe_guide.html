function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function renderBlock(b) {
  if (b.type === "h3") return `<h3>${esc(b.text)}</h3>`;
  if (b.type === "p") return `<p>${esc(b.text)}</p>`;
  if (b.type === "info") return `<div class="info-box">${esc(b.text)}</div>`;
  if (b.type === "warn") return `<div class="warn-box">⚠️ ${esc(b.text)}</div>`;
  if (b.type === "table") {
    const th = b.headers.map(h => `<th>${esc(h)}</th>`).join("");
    const tr = b.rows.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join("")}</tr>`).join("");
    return `<div class="table-wrap"><table><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table></div>`;
  }
  if (b.type === "tags") {
    return `<div class="tags">${b.items.map(t => `<span class="tag-item">${esc(t)}</span>`).join("")}</div>`;
  }
  if (b.type === "checklist") {
    return `<div class="checklist">${b.items.map(i => `<div class="check-item">${esc(i)}</div>`).join("")}</div>`;
  }
  if (b.type === "grid") {
    return `<div class="grid">${b.items.map(g => `
      <div class="grid-item" style="background:${g.color};border-left-color:${g.border}">
        <div class="g-label">${esc(g.label)}</div>
        <div class="g-body">${esc(g.items)}</div>
      </div>`).join("")}</div>`;
  }
  return "";
}

function renderSection(id) {
  const s = SECTIONS.find(x => x.id === id);
  if (!s) return;
  document.getElementById("sectionSub").textContent = s.subtitle;
  document.getElementById("sectionTitle").textContent = `${s.icon} ${s.title}`;
  document.getElementById("sectionContent").innerHTML = s.content.map(renderBlock).join("");
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.id === id);
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function buildTabs() {
  const nav = document.getElementById("tabs");
  nav.innerHTML = SECTIONS.map(s => `
    <button class="tab" data-id="${s.id}">
      <span class="icon">${s.icon}</span>${esc(s.title)}
    </button>`).join("");
  nav.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => renderSection(btn.dataset.id));
  });
}

buildTabs();
renderSection("overview");
</script>

</body>
</html>
