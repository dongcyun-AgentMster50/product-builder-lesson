<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <style>
        /* General Body Styles */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #1A1C29;
            color: #E6E8FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* Main Container */
        .container {
            background-color: #2D3047;
            border-radius: 12px;
            padding: 24px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Header Section */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dice-icon {
            width: 24px;
            height: 24px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .description {
            font-size: 0.9rem;
            color: #A9B2D3;
            margin: 8px 0 24px;
        }

        /* Main Action Buttons */
        .main-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        #generate-btn {
            flex-grow: 1;
            background: linear-gradient(90deg, #3B82F6, #22D3EE);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        #generate-btn:hover {
            opacity: 0.9;
        }

        #copy-btn {
            background-color: #4A4E69;
            color: #E6E8FA;
            border: 1px solid #5A5E7D;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #copy-btn:hover {
            background-color: #5A5E7D;
        }

        /* Bonus Number Option */
        .bonus-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        #bonus-checkbox {
            accent-color: #3B82F6;
        }

        .bonus-option label {
            font-size: 0.9rem;
            color: #A9B2D3;
        }

        /* Results Display */
        .results-container {
            background-color: #1F2133;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .numbers-display {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }

        .result-set-box {
            background-color: #2D3047;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .set-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #A9B2D3;
            width: 60px;
        }

        .number-circles-container {
            display: flex;
            flex-grow: 1;
            justify-content: space-around;
        }

        .number-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: #1F2133;
        }

        .timestamp {
            font-size: 0.8rem;
            color: #A9B2D3;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://i.imgur.com/8v2z3of.png" alt="dice icon" class="dice-icon">
            <h2>로또 번호 추천기</h2>
        </div>
        <p class="description">버튼을 누르면 1~45 사이에서 중복 없이 6개 번호를 뽑아줘요.</p>
        
        <div class="main-actions">
            <button id="generate-btn">번호 추천 받기</button>
            <button id="copy-btn">복사</button>
        </div>
        
        <div class="bonus-option">
            <input type="checkbox" id="bonus-checkbox">
            <label for="bonus-checkbox">보너스 번호(1개)도 뽑기</label>
        </div>
        
        <div class="results-container">
            <div id="numbers-display" class="numbers-display">
                <!-- 번호가 여기에 표시됩니다 -->
            </div>
            <p id="timestamp" class="timestamp"></p>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const generateBtn = document.getElementById('generate-btn');
            const copyBtn = document.getElementById('copy-btn');
            const bonusCheckbox = document.getElementById('bonus-checkbox');
            const numbersDisplay = document.getElementById('numbers-display');
            const timestampElem = document.getElementById('timestamp');

            let allNumberSets = [];

            function getNumberColor(number) {
                if (number <= 10) return '#FBBF24';
                if (number <= 20) return '#3B82F6';
                if (number <= 30) return '#EF4444';
                if (number <= 40) return '#6B7280';
                return '#10B981';
            }

            function generateSingleSet(includeBonus) {
                const mainCount = includeBonus ? 5 : 6;
                const numbers = new Set();
                
                while (numbers.size < mainCount) {
                    const randomNumber = Math.floor(Math.random() * 45) + 1;
                    numbers.add(randomNumber);
                }
                const mainNumbers = Array.from(numbers).sort((a, b) => a - b);
                
                let bonusNumber = null;
                if (includeBonus) {
                    while (true) {
                        const randomBonus = Math.floor(Math.random() * 45) + 1;
                        if (!numbers.has(randomBonus)) {
                            bonusNumber = randomBonus;
                            break;
                        }
                    }
                }
                
                return { main: mainNumbers, bonus: bonusNumber };
            }

            function generateAndDisplaySets() {
                numbersDisplay.innerHTML = '';
                allNumberSets = [];

                for (let i = 0; i < 5; i++) {
                    const includeBonus = bonusCheckbox.checked;
                    const { main, bonus } = generateSingleSet(includeBonus);
                    
                    const fullSetString = bonus !== null ? `${main.join(', ')} + ${bonus}` : main.join(', ');
                    allNumberSets.push(fullSetString);

                    const setBox = document.createElement('div');
                    setBox.className = 'result-set-box';

                    const label = document.createElement('span');
                    label.className = 'set-label';
                    label.textContent = `자동 ${i + 1}`;

                    const numberCirclesContainer = document.createElement('div');
                    numberCirclesContainer.className = 'number-circles-container';

                    main.forEach(number => {
                        const circle = document.createElement('div');
                        circle.className = 'number-circle';
                        circle.textContent = number;
                        circle.style.backgroundColor = getNumberColor(number);
                        numberCirclesContainer.appendChild(circle);
                    });

                    if (bonus !== null) {
                        const plusSign = document.createElement('span');
                        plusSign.textContent = '+';
                        plusSign.style.color = '#A9B2D3';
                        plusSign.style.fontWeight = 'bold';
                        plusSign.style.margin = '0 4px';
                        numberCirclesContainer.appendChild(plusSign);

                        const bonusCircle = document.createElement('div');
                        bonusCircle.className = 'number-circle';
                        bonusCircle.textContent = bonus;
                        bonusCircle.style.backgroundColor = '#10B981';
                        numberCirclesContainer.appendChild(bonusCircle);
                    }
                    
                    setBox.appendChild(label);
                    setBox.appendChild(numberCirclesContainer);
                    numbersDisplay.appendChild(setBox);
                }

                updateTimestamp();
            }

            function updateTimestamp() {
                const now = new Date();
                timestampElem.textContent = `추천 완료! (${now.getFullYear()}. ${now.getMonth() + 1}. ${now.getDate()}. ${now.getHours()}시 ${now.getMinutes()}분 ${now.getSeconds()}초)`;
            }

            function copyToClipboard() {
                if (allNumberSets.length === 0) {
                    alert('먼저 번호를 추천받아 주세요.');
                    return;
                }
                const numbersString = allNumberSets.join('\n');
                navigator.clipboard.writeText(numbersString).then(() => {
                    alert('5세트의 번호가 클립보드에 복사되었습니다.');
                }).catch(err => {
                    alert('복사에 실패했습니다.');
                    console.error('Copy failed', err);
                });
            }

            generateBtn.addEventListener('click', generateAndDisplaySets);
            copyBtn.addEventListener('click', copyToClipboard);
            bonusCheckbox.addEventListener('change', generateAndDisplaySets);

            generateAndDisplaySets();
        });
    </script>
</body>
</html>
