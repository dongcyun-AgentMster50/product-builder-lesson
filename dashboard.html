<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartThings 27 시나리오 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
:root {
  --bg0: #f5f7fa;
  --bg1: #ffffff;
  --bg3: #eef1f6;
  --card: #ffffff;
  --card-hover: #f8fafc;
  --border: #e3e7ee;
  --border-light: #c9d0db;
  --accent: #1428a0;
  --accent-mid: #2e45d4;
  --text1: #15171a;
  --text2: #505864;
  --text3: #8a92a0;
  --hero-bg: #0b1027;
  --hero-text: #eef0f7;
  --hero-border: #1a2040;
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
  --shadow-md: 0 4px 12px rgba(15,23,42,0.06), 0 2px 4px rgba(15,23,42,0.04);
  --shadow-lg: 0 12px 32px rgba(15,23,42,0.08), 0 4px 12px rgba(15,23,42,0.05);
  --radius: 12px;
  --radius-sm: 8px;
  --cat-life: #7b2cbf;
  --cat-safe: #c93d6a;
  --cat-care: #d97706;
  --cat-save: #0a8f6e;
  --cat-mgmt: #1428a0;
  --cat-start: #475569;
  --cat-device: #0f766e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg0);
  color: var(--text1);
  font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

/* ─── HEADER ─── */
header {
  padding: 18px 32px;
  border-bottom: 1px solid var(--hero-border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--hero-bg);
  color: var(--hero-text);
  position: sticky; top: 0; z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 32px; height: 32px; background: var(--accent);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.logo-name {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 14px; letter-spacing: 0.04em; color: var(--hero-text);
}
.header-right { display: flex; gap: 8px; }
.header-link {
  font-size: 12px; color: rgba(238,240,247,0.85); padding: 8px 14px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-sm); text-decoration: none; transition: all 0.15s;
}
.header-link:hover { background: rgba(255,255,255,0.14); color: #fff; }
.header-link.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ─── MAIN ─── */
main { max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; }

.page-intro { margin-bottom: 36px; }
.page-intro h1 {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: clamp(24px, 3.6vw, 34px);
  line-height: 1.2; margin-bottom: 10px;
}
.page-intro h1 span { color: var(--accent); }
.page-intro p { font-size: 14px; color: var(--text2); max-width: 560px; line-height: 1.65; }

/* ─── FILTER BAR ─── */
.filter-bar {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px; margin-bottom: 28px;
  box-shadow: var(--shadow-sm);
  display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
}
.search-box {
  flex: 1; min-width: 220px; position: relative;
}
.search-box input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; color: var(--text1);
  font-family: inherit; transition: all 0.15s;
}
.search-box input:focus {
  outline: none; background: #fff; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(20,40,160,0.1);
}
.search-box::before {
  content: '🔍'; position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); font-size: 14px; opacity: 0.6;
}
.cat-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-pill {
  padding: 7px 13px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg1);
  font-size: 12px; font-weight: 500; color: var(--text2);
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.cat-pill:hover { border-color: var(--border-light); color: var(--text1); }
.cat-pill.active {
  background: var(--accent); border-color: var(--accent); color: #fff;
}

/* ─── GRID ─── */
.scenario-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.scenario-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
}
.scenario-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-light);
}
.scenario-thumb {
  width: 100%;
  background: #f2f4f8; position: relative; overflow: hidden;
  height: 360px; /* 카드에서는 상단 부분만 노출 (모달에서 전체 이미지 확인) */
}
.scenario-thumb img {
  width: 100%;
  height: auto;
  display: block;
  object-position: top;
}
.scenario-thumb .fallback {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; background: linear-gradient(135deg, #eef1f6, #dce3ed);
}
.scenario-num {
  position: absolute; top: 10px; left: 10px;
  background: rgba(11,16,39,0.85); color: #fff;
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 10px; letter-spacing: 0.08em;
  padding: 4px 8px; border-radius: 6px;
}
.cat-badge {
  position: absolute; top: 10px; right: 10px;
  font-size: 10px; font-weight: 600;
  padding: 4px 9px; border-radius: 6px;
  background: #ffffff; color: var(--text1);
  box-shadow: var(--shadow-sm);
}
.cat-badge[data-cat="스마트 라이프"] { color: var(--cat-life); }
.cat-badge[data-cat="안전"] { color: var(--cat-safe); }
.cat-badge[data-cat="케어"] { color: var(--cat-care); }
.cat-badge[data-cat="절약"] { color: var(--cat-save); }
.cat-badge[data-cat="관리"] { color: var(--cat-mgmt); }
.cat-badge[data-cat="시작하기"] { color: var(--cat-start); }
.cat-badge[data-cat="내 기기 관련"] { color: var(--cat-device); }

.scenario-body {
  padding: 16px 18px 18px;
  display: flex; flex-direction: column; flex: 1;
}
.scenario-title {
  font-size: 15px; font-weight: 600;
  line-height: 1.35; color: var(--text1);
  margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.scenario-desc {
  font-size: 12px; color: var(--text2);
  line-height: 1.55; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-bottom: 12px;
}
.scenario-meta {
  display: flex; gap: 14px; align-items: center;
  padding-top: 12px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text3);
}
.scenario-meta .meta-item { display: flex; align-items: center; gap: 4px; }
.scenario-meta .story-count {
  margin-left: auto; background: rgba(20,40,160,0.08);
  color: var(--accent); padding: 3px 8px; border-radius: 10px;
  font-weight: 600; font-size: 10px;
}

/* ─── MODAL — 사이드 바이 사이드 레이아웃 ─── */
#modal {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(11,16,39,0.6);
  display: none; align-items: flex-start; justify-content: center;
  padding: 40px 20px; overflow-y: auto;
  backdrop-filter: blur(8px);
}
#modal.show { display: flex; }
.modal-box {
  background: #fff; border-radius: 20px;
  max-width: 560px; width: 100%;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.3s ease;
  position: relative;
  overflow: hidden;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
/* P7-A-6: modal-hero JPEG 제거 — compact 헤더로 대체. */
.modal-close {
  position: absolute; top: 14px; right: 14px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(11,16,39,0.85); color: #fff;
  border: none; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; z-index: 10;
}
.modal-close:hover { background: rgba(11,16,39,1); transform: scale(1.05); }

.modal-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-cat {
  display: inline-block;
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(20,40,160,0.08); color: var(--accent);
  margin-bottom: 10px;
}
.modal-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 22px; line-height: 1.3; color: var(--text1);
  margin-bottom: 8px;
}
.modal-meta-row {
  display: flex; gap: 14px; font-size: 11px; color: var(--text3);
  margin-bottom: 14px;
}
.modal-desc {
  font-size: 13px; line-height: 1.65; color: var(--text2);
}

/* 스토리 카드 통합 영역 — 스토리당 1 카드 */
.modal-stories-area {
  padding: 20px 24px 28px;
  background: #fafbfd;
}
.modal-stories-intro {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 14px;
}

.story-card-unified {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  margin-bottom: 12px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.story-card-unified:last-child { margin-bottom: 0; }
.story-card-unified.is-chatting {
  border-color: var(--accent);
  box-shadow: 0 4px 14px rgba(20,40,160,0.10);
}

.story-card-row {
  display: flex; gap: 14px;
  padding: 14px 14px 12px;
}
.story-card-image {
  flex-shrink: 0;
  width: 120px; aspect-ratio: 4 / 3;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  user-select: none;
  background: linear-gradient(135deg, #eef1f6, #c9d0db);
  color: var(--text2);
}
.story-card-image[data-cat="스마트 라이프"] { background: linear-gradient(135deg, #f5e8ff, #d9b9f5); color: var(--cat-life); }
.story-card-image[data-cat="안전"]          { background: linear-gradient(135deg, #fae5ec, #f5b5cb); color: var(--cat-safe); }
.story-card-image[data-cat="케어"]          { background: linear-gradient(135deg, #fdecd0, #f5c896); color: var(--cat-care); }
.story-card-image[data-cat="절약"]          { background: linear-gradient(135deg, #d8f2ea, #a8dec9); color: var(--cat-save); }
.story-card-image[data-cat="관리"]          { background: linear-gradient(135deg, #dce3f0, #abbcde); color: var(--cat-mgmt); }
.story-card-image[data-cat="시작하기"]       { background: linear-gradient(135deg, #e3e7ee, #c0cad9); color: var(--cat-start); }
.story-card-image[data-cat="내 기기 관련"]    { background: linear-gradient(135deg, #d4f0ec, #a8dcd0); color: var(--cat-device); }

.story-card-body { flex: 1; min-width: 0; }
.story-card-num {
  font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.story-card-title {
  font-size: 14px; font-weight: 700;
  color: var(--text1); line-height: 1.4;
  margin-bottom: 6px;
}
.story-card-content {
  font-size: 12.5px; color: var(--text2); line-height: 1.65;
}
.story-card-note {
  margin-top: 8px; padding: 6px 10px;
  background: var(--bg3); border-radius: 6px;
  font-size: 11px; color: var(--text3);
  border-left: 2px solid var(--border-light);
}

.story-card-actions {
  display: flex; gap: 8px;
  padding: 0 14px 14px;
  flex-wrap: wrap;
}
.story-cta-btn {
  flex: 1; min-width: 140px;
  padding: 9px 14px; border-radius: 8px;
  border: 1px solid var(--border);
  background: #fff; color: var(--accent);
  font-weight: 600; font-size: 12.5px;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s; text-align: center;
}
.story-cta-btn:hover {
  background: rgba(20,40,160,0.06);
  border-color: var(--accent);
}

.story-card-unified .story-chat-toggle {
  flex: 1; min-width: 140px;
  padding: 9px 14px; border-radius: 8px;
  border: 1px solid var(--border);
  background: #fff; color: var(--text1);
  font-weight: 500; font-size: 12.5px;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
}
.story-card-unified .story-chat-toggle:hover { background: var(--bg3); }
.story-card-unified .story-chat-toggle.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.story-card-unified .story-chat-toggle.locked {
  background: var(--bg3); color: var(--text2);
}

.story-card-unified .story-chat-mount {
  display: none;
  padding: 0 14px 14px;
  background: #fff;
  border-top: 1px solid var(--border);
}
.story-card-unified .story-chat-mount.open { display: block; padding-top: 14px; }

/* sticky bar 가 modal 위로 — modal z-index 1000 보다 높게 */
body.has-storychat-bar .storychat-bar { z-index: 1100; }
body.has-storychat-bar #modal { padding-bottom: 140px; }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text3);
}
.loading {
  text-align: center; padding: 80px 20px; color: var(--text3);
}

@media (max-width: 640px) {
  main { padding: 24px 16px 60px; }
  .scenario-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .modal-title { font-size: 20px; }
  .modal-header { padding: 24px 20px 18px; }
  .modal-stories-area { padding: 18px 20px 24px; }
  .story-card-row { flex-direction: column; gap: 10px; }
  .story-card-image { width: 100%; aspect-ratio: 16 / 9; }
  .story-card-actions { flex-direction: column; }
  .story-cta-btn,
  .story-card-unified .story-chat-toggle { min-width: 0; width: 100%; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-icon">⚡</div>
    <div class="logo-name">SmartThings Scenario Agent</div>
  </div>
  <div class="header-right">
    <a href="./dashboard.html" class="header-link active">📋 대시보드</a>
    <a href="./v2.html" class="header-link">🚀 시나리오 빌더</a>
  </div>
</header>

<main>
  <div class="page-intro">
    <h1>SmartThings 27개 시나리오<br><span>한눈에 살펴보기</span></h1>
    <p>스마트싱스 앱이 안내하는 27개 일상 시나리오. 카드를 누르면 원문 설명, 하위 스토리 2~3개, 사용 기기, 구매 가능 제품까지 한 번에 펼쳐 볼 수 있어요.</p>
  </div>

  <div class="filter-bar">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="시나리오 제목·설명 검색...">
    </div>
    <div class="cat-pills" id="cat-pills"></div>
  </div>

  <div id="grid-wrap">
    <div class="loading">27개 시나리오 불러오는 중...</div>
  </div>
</main>

<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- P7-A-6: sticky bottom storychat bar (mountInputBar 가 내용 채움). -->
<div id="global-storychat-bar" aria-label="스토리 채팅 입력 바"></div>

<script src="./js/story-chat.js"></script>
<script>
const TOTAL = 27;
const THUMB_PATH = (n) => `references/scenario_thumbs/scenario_${String(n).padStart(3,'0')}.jpg`;
const DB_PATH = (n) => `scenarios/db/scenario_${String(n).padStart(3,'0')}.json`;

const state = {
  scenarios: [],
  activeCategory: 'all',
  searchQuery: '',
};

// Some scenario files wrap content in { _meta, scenarios: [...] }; others are flat.
function normalize(json) {
  if (json && Array.isArray(json.scenarios)) return json.scenarios[0];
  return json;
}

async function loadAll() {
  const results = [];
  for (let i = 1; i <= TOTAL; i++) {
    try {
      const res = await fetch(DB_PATH(i));
      if (!res.ok) throw new Error(res.statusText);
      const json = await res.json();
      const s = normalize(json);
      if (s) results.push({ ...s, _no: i });
    } catch (e) {
      console.warn(`scenario_${i} load failed:`, e);
    }
  }
  state.scenarios = results;
  renderFilters();
  render();
}

function renderFilters() {
  const cats = ['all', ...new Set(state.scenarios.map(s => s?.depth_0?.category).filter(Boolean))];
  const el = document.getElementById('cat-pills');
  el.innerHTML = cats.map(c =>
    `<button class="cat-pill ${c === 'all' ? 'active' : ''}" data-cat="${c}">${c === 'all' ? '전체' : c}</button>`
  ).join('');
  el.addEventListener('click', e => {
    if (!e.target.classList.contains('cat-pill')) return;
    state.activeCategory = e.target.dataset.cat;
    el.querySelectorAll('.cat-pill').forEach(p => p.classList.toggle('active', p.dataset.cat === state.activeCategory));
    render();
  });
}

function filtered() {
  const q = state.searchQuery.toLowerCase();
  return state.scenarios.filter(s => {
    const d0 = s.depth_0 || {};
    const d1 = s.depth_1 || {};
    if (state.activeCategory !== 'all' && d0.category !== state.activeCategory) return false;
    if (!q) return true;
    const hay = [d0.card_title, d1.title, d1.description].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

function render() {
  const wrap = document.getElementById('grid-wrap');
  const list = filtered();
  if (!list.length) {
    wrap.innerHTML = `<div class="empty-state">검색 결과가 없습니다.</div>`;
    return;
  }
  wrap.innerHTML = `<div class="scenario-grid">${list.map(cardHTML).join('')}</div>`;
  wrap.querySelectorAll('.scenario-card').forEach(c => {
    c.addEventListener('click', () => openModal(Number(c.dataset.no)));
  });
}

function cardHTML(s) {
  const d0 = s.depth_0 || {};
  const d1 = s.depth_1 || {};
  const stats = d0.stats || {};
  const storyCount = (d1.stories || []).length;
  const cat = d0.category || '';
  return `
    <article class="scenario-card" data-no="${s._no}">
      <div class="scenario-thumb">
        <img src="${THUMB_PATH(s._no)}" alt="${d0.card_title || ''}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="fallback" style="display:none">📷</div>
        <div class="scenario-num">#${String(s._no).padStart(3,'0')}</div>
        ${cat ? `<div class="cat-badge" data-cat="${cat}">${cat}</div>` : ''}
      </div>
      <div class="scenario-body">
        <h3 class="scenario-title">${d0.card_title || d1.title || '(제목없음)'}</h3>
        <p class="scenario-desc">${(d1.description || '').slice(0, 110)}${(d1.description || '').length > 110 ? '…' : ''}</p>
        <div class="scenario-meta">
          <span class="meta-item">👁 ${stats.views_display || '—'}</span>
          <span class="meta-item">♥ ${stats.likes || 0}</span>
          <span class="story-count">스토리 ${storyCount}</span>
        </div>
      </div>
    </article>`;
}

// P7-A-6: 카테고리 placeholder 아이콘 (per-story 크롭 자산은 후속 2단계 작업)
const CAT_ICON = {
  '스마트 라이프': '✨',
  '안전': '🛡',
  '케어': '💝',
  '절약': '🌱',
  '관리': '⚙',
  '시작하기': '🚀',
  '내 기기 관련': '📱',
};

function escapeHTML(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function openModal(no) {
  const s = state.scenarios.find(x => x._no === no);
  if (!s) return;
  const d0 = s.depth_0 || {};
  const d1 = s.depth_1 || {};
  const stats = d0.stats || {};
  const stories = d1.stories || [];
  const cat = d0.category || '';
  const title = d1.title || d0.card_title || '(제목 없음)';
  const desc = d1.description || '';

  document.getElementById('modal-box').innerHTML = `
    <button class="modal-close" onclick="closeModal()" aria-label="닫기">✕</button>
    <div class="modal-header">
      ${cat ? `<span class="modal-cat">${escapeHTML(cat)}</span>` : ''}
      <h2 class="modal-title">${escapeHTML(title)}</h2>
      <div class="modal-meta-row">
        ${stats.views_display ? `<span>👁 ${escapeHTML(stats.views_display)}</span>` : ''}
        ${stats.likes ? `<span>♥ ${stats.likes}</span>` : ''}
        <span>📖 스토리 ${stories.length}개</span>
      </div>
      ${desc ? `<p class="modal-desc">${escapeHTML(desc)}</p>` : ''}
    </div>
    ${stories.length ? `
      <div class="modal-stories-area">
        <div class="modal-stories-intro">💬 스토리별로 살펴보고 BYOK로 더 파보기</div>
        ${stories.map((st, i) => unifiedCardHTML(st, no, cat, i)).join('')}
      </div>
    ` : ''}
  `;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';

  // CTA 버튼 — depth_2 가이드 진입 (1단계: console + alert. 실제 라우팅은 별도 작업)
  document.querySelectorAll('.story-cta-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ref = btn.dataset.depth2Ref || '';
      const type = btn.dataset.ctaType || '';
      const label = btn.dataset.ctaLabel || '';
      console.log('[CTA]', { label, ref, type });
      alert(`${label}\n\ndepth_2_ref: ${ref}\ncta_type: ${type}\n\n실제 가이드 라우팅은 후속 작업입니다.`);
    });
  });

  // 스토리 채팅 토글 — sticky bar 컨텍스트 전환 + 카드 내부 응답 영역 (P7-A-6: 신 API 마이그레이션)
  document.querySelectorAll('.story-card-unified [data-chat-toggle]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.chatToggle;
      const mount = document.getElementById(id);
      const card = btn.closest('.story-card-unified');
      if (!mount || !card) return;
      const scenarioNo = Number(btn.dataset.scenarioNo);
      const storyNo = Number(btn.dataset.storyNo);

      const wasActive = btn.classList.contains('active');
      // 다른 카드 비활성 (단일 활성 스토리)
      document.querySelectorAll('.story-card-unified .story-chat-toggle.active').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.story-card-unified .story-chat-mount.open').forEach(m => m.classList.remove('open'));
      document.querySelectorAll('.story-card-unified.is-chatting').forEach(c => c.classList.remove('is-chatting'));

      if (wasActive) {
        if (window.StoryChat) {
          window.StoryChat.deactivate();
          window.StoryChat.refreshAllToggles();
        }
        return;
      }

      mount.classList.add('open');
      btn.classList.add('active');
      card.classList.add('is-chatting');

      const story = stories.find(x => (x.story_no || 0) === storyNo) || stories[0];
      const scenarioMeta = { id: scenarioNo, title, category: cat };

      if (window.StoryChat) {
        if (!mount.dataset.mounted) {
          window.StoryChat.mountResponseArea(mount, scenarioNo, storyNo);
          mount.dataset.mounted = '1';
        }
        window.StoryChat.activate(scenarioNo, storyNo, scenarioMeta, story);
        window.StoryChat.refreshAllToggles();
      }
    });
  });

  // BYOK 자물쇠 + 배지 갱신
  if (window.StoryChat?.refreshAllToggles) {
    window.StoryChat.refreshAllToggles();
  }
}

function unifiedCardHTML(st, scenarioNo, cat, idx) {
  const sNo = st.story_no || (idx + 1);
  const chatId = `chat-${scenarioNo}-${sNo}`;
  const icon = CAT_ICON[cat] || '💡';
  const ctaLabel = st.cta_label || '사용 방법 확인';
  const ctaType = st.cta_type || '';
  const ref = st.depth_2_ref || '';
  return `
    <article class="story-card-unified" data-story-no="${sNo}">
      <div class="story-card-row">
        <div class="story-card-image" data-cat="${escapeHTML(cat)}">
          <span class="placeholder-icon" aria-hidden="true">${icon}</span>
        </div>
        <div class="story-card-body">
          <div class="story-card-num">스토리 ${sNo}</div>
          <h3 class="story-card-title">${escapeHTML(st.title || '')}</h3>
          <p class="story-card-content">${escapeHTML(st.content || '')}</p>
          ${(st.usage_notes || []).map(n => `<div class="story-card-note">ℹ ${escapeHTML(n)}</div>`).join('')}
        </div>
      </div>
      <div class="story-card-actions">
        <button type="button" class="story-cta-btn"
                data-cta-type="${escapeHTML(ctaType)}"
                data-depth-2-ref="${escapeHTML(ref)}"
                data-cta-label="${escapeHTML(ctaLabel)}">
          ${escapeHTML(ctaLabel)} →
        </button>
        <button type="button" class="story-chat-toggle"
                data-chat-toggle="${chatId}"
                data-scenario-no="${scenarioNo}"
                data-story-no="${sNo}">
          💬 이 스토리로 더 파보기
        </button>
      </div>
      <div class="story-chat-mount" id="${chatId}"></div>
    </article>`;
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
  // 모달 닫힐 때 sticky bar 컨텍스트 해제
  if (window.StoryChat?.deactivate) {
    window.StoryChat.deactivate();
    window.StoryChat.refreshAllToggles();
  }
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
document.getElementById('search-input').addEventListener('input', e => {
  state.searchQuery = e.target.value.trim();
  render();
});

// P7-A-6: 페이지 레벨 sticky bottom storychat-bar 마운트 (페이지 1회)
const __barEl = document.getElementById('global-storychat-bar');
if (__barEl && window.StoryChat?.mountInputBar) {
  window.StoryChat.mountInputBar(__barEl);
}

loadAll();
</script>
</body>
</html>
